<!DOCTYPE html>

.bg-half {
    background-image: url("test/background%20flowers.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    width: 100%;
    height: 250px;
    margin: 0;
    padding: 0;
    color: #fff;
}

        .hero {
            width: 100%;
